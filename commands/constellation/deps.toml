description = "Analyze dependencies for a file or symbol"

prompt = """
Analyze dependencies for the specified file: {{args}}.

**If no file path is provided**, ask the user what file they want to analyze.

If the `--reverse` or `-r` flag is present in `{{args}}`:
1. Use `mcp_constellation_code_intel` with `getDependents({ filePath: "{{args}}", depth: 2 })`.
2. Present: Summary (count of files that depend on this one) and Dependents (each file and what it imports). Note: Suggest reviewing these files if planning changes.

Otherwise:
1. Use `mcp_constellation_code_intel` with `getDependencies({ filePath: "{{args}}", depth: 2, includePackages: true })` and `findCircularDependencies({ filePath: "{{args}}", maxDepth: 5 })`.
2. Present: Summary (count of internal vs external), Internal Dependencies (each file and symbols imported), External Packages (npm list), and Circular Dependencies (cycles detected, severity, and path).

Highlight any circular dependencies as potential issues to address.
"""
